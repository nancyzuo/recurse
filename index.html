<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>tic tac toe</title>
  <link rel="stylesheet" href="styles.css">

</head>

<body>

    <h1 id="status">❌ tic tac toe ⭕️</h1>
    
    <div id="board"></div>
    <button onclick="resetGame()">restart</button>

    <!-- GAME MODES -->
    <div class="mode-buttons">
      <button id="oneBtn" onclick="setMode('one')" class="player ">1 player 🤖</button>
      <button id="twoBtn" onclick="setMode('two')" class="player">2 player🧍‍♂️🧍‍♀️</button>
      <!-- <button id="ultimateBtn" onclick="setMode('ultimate')" class="player">ultimate 🌪️</button> -->
    </div>
    <script src="script.js"></script>

</body>
</html>
